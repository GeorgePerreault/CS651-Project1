<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Contact Page</title>
</head>
<body>
<h1>Contact Us</h1>
<div class="container">
    <div class="row">
        <div class="column">
            applesaucesystems@yahoo.com
            <br></br>1234 Dingleberry Drive, Austin, TX 78703
        </div>
        <div class="column">
        <form>
            <div class="form-group">
                <label >Full Name</label>
                <input type="name" class="form-control" id="nameForm" placeholder="Enter Name">
            </div>
            <div class="form-group">
                <label >Email address</label>
                <input type="email" class="form-control" id="emailForm" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label >Message</label>
                <input type="name" class="form-control" id="messageForm" placeholder="Enter Message">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        </div>
    </div>
</div>
</body>
</html>
